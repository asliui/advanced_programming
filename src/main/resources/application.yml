spring:
  application:
    name: lab7-movie-api
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  datasource:
    url: ${LAB6_DB_URL:jdbc:postgresql://localhost:5432/lab6_movies}
    username: ${LAB6_DB_USER:postgres}
    password: ${LAB6_DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:lab7-dev-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-please-change-in-production}
  expiration-ms: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: INFO
